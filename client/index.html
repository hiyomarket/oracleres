<!doctype html>
<html lang="zh-TW">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>天命共振 Destiny Oracle - 數位錦囊 | 八字命理、每日運勢、天命問卜</title>
    <meta name="description" content="天命共振 Destiny Oracle 數位錦囊，融合八字命理、紫微斗數與現代算法。輸入生日即可體驗命格解析、每日能量時辰、天命問卜，讓古老智慧在現代生活中指引你的每一步。" />
    <meta name="keywords" content="天命共振,Destiny Oracle,八字命理,紫微斗數,每日運勢,命格分析" />
    <!-- Open Graph -->
    <meta property="og:title" content="天命共振 Destiny Oracle - 數位錦囊" />
    <meta property="og:description" content="融合八字命理、紫微斗數與現代算法的命理智慧平台。輸入生日即可體驗專屬命格解析與每日能量指引。" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_TW" />
    <!-- 預載入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet" />
    <!-- PWA 支援 -->
    <meta name="theme-color" content="#050d14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="天命共振" />
    <!-- 主題初始化：在 React 載入前立刻套用深/淺色 class，避免閃爍 -->
    <script>
      (function() {
        try {
          var oracleTheme = localStorage.getItem('oracle_theme');
          var isLight = oracleTheme && oracleTheme.endsWith('_light');
          if (isLight) {
            document.documentElement.removeAttribute('class');
            document.documentElement.setAttribute('data-theme-mode', 'light');
          } else {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-theme-mode', 'dark');
          }
        } catch(e) {
          // 若 localStorage 不可用，預設深色
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
